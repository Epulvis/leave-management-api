services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leave_management_api
    restart: always
    ports:
      - "3333:3333"
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - leave_network
    environment:
      - HOST=${HOST}
      - PORT=${PORT}
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING}

  mysql_db:
    image: mysql:8.0
    container_name: leave_management_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - leave_network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: leave_management_pma
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: ${PMA_HOST}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - mysql_db
    networks:
      - leave_network

volumes:
  mysql_data:

networks:
  leave_network:
    driver: bridge