services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leave_management_api
    restart: always
    ports:
      - "3333:3333"
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - leave_network
    environment:
      - HOST=0.0.0.0
      - PORT=3333

  mysql_db:
    image: mysql:8.0
    container_name: leave_management_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: leave_management
      MYSQL_USER: adonis_user
      MYSQL_PASSWORD: adonis_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - leave_network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  leave_network:
    driver: bridge